# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: cpe

before:
  hooks:
    - go mod download

builds:
  - id: cpe
    main: .
    binary: cpe
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X github.com/spachava753/cpe/internal/version.value={{ .Version }}
    env:
      - CGO_ENABLED=0

archives:
  - id: cpe
    ids:
      - cpe
    name_template: >-
      {{ .ProjectName }}_
      {{- .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{- end }}
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'

release:
  prerelease: auto
  mode: replace
  replace_existing_artifacts: true
