# yaml-language-server: $schema=https://raw.githubusercontent.com/spachava753/cpe/refs/heads/main/schema/cpe-config-schema.json
version: "1.0"

models:
  - ref: opus
    display_name: "Claude Opus 4.8"
    id: claude-opus-4-8
    type: anthropic
    api_key_env: ANTHROPIC_API_KEY
    context_window: 1000000
    max_output: 128000
    thinkingValues: &claudeThinkingValues
      - value: disabled
        name: Disabled
      - value: adaptive
        name: Adaptive
      - value: low
        name: Low
      - value: medium
        name: Medium
      - value: high
        name: High
      - value: xhigh
        name: Extra High
      - value: max
        name: Max
    input_cost_per_million: 5
    output_cost_per_million: 25
    cache_read_cost_per_million: 6.25
    cache_write_cost_per_million: 0.5
    systemPromptPath: ./agent_instructions.md
    timeout: &standardTimeout 1h
    generationParams:
      maxGenerationTokens: 128000
    codeMode: &standardCodeMode
      enabled: true
      maxTimeout: 3600
      largeOutputCharLimit: 150000

  - ref: vertex-sonnet
    display_name: "Claude Sonnet 4.6 (Vertex AI)"
    id: claude-sonnet-4-6
    type: anthropic_vertex
    context_window: 200000
    max_output: 64000
    thinkingValues: *claudeThinkingValues
    systemPromptPath: ./agent_instructions.md
    timeout: *standardTimeout
    generationParams:
      maxGenerationTokens: 64000
    codeMode: *standardCodeMode
    vertex:
      project_id: my-gcp-project
      region: global

  - ref: gpt55-oauth
    display_name: "GPT 5.5 (OAuth)"
    id: gpt-5.5
    type: responses
    base_url: https://chatgpt.com/backend-api/codex
    auth_method: oauth
    context_window: 272000
    max_output: 128000
    thinkingValues: &openAIThinkingValues
      - value: none
        name: None
      - value: low
        name: Low
      - value: medium
        name: Medium
      - value: high
        name: High
      - value: xhigh
        name: Extra High
    input_cost_per_million: 5
    output_cost_per_million: 30
    cache_read_cost_per_million: 0.5
    systemPromptPath: ./gpt_agent_instructions.md
    timeout: *standardTimeout
    generationParams:
      thinkingBudget: high
    codeMode: *standardCodeMode

  - ref: gpt55-api
    display_name: "GPT 5.5 (API Key)"
    id: gpt-5.5
    type: responses
    api_key_env: OPENAI_API_KEY
    context_window: 272000
    max_output: 128000
    thinkingValues: *openAIThinkingValues
    input_cost_per_million: 5
    output_cost_per_million: 30
    cache_read_cost_per_million: 0.5
    systemPromptPath: ./gpt_agent_instructions.md
    timeout: *standardTimeout
    generationParams:
      thinkingBudget: high
    codeMode: *standardCodeMode
