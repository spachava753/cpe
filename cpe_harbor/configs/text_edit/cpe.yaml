version: "1.0"
models:
  - ref: glm
    display_name: "GLM 5.1"
    id: glm-5.1
    type: zai
    base_url: https://api.z.ai/api/coding/paas/v4
    api_key_env: Z_API_KEY
    context_window: 202752
    max_output: 131072
    input_cost_per_million: 1
    output_cost_per_million: 3.2
    systemPromptPath: "$HOME/.config/cpe/agent_instructions.md"
    timeout: 1h
    generationParams:
      temperature: 1
    mcpServers:
      editor:
        type: builtin
        enabledTools:
          - text_edit
    codeMode:
      enabled: true
      largeOutputCharLimit: 150000
      maxTimeout: 3600
